
spring.config.import=optional:dotenv:.env

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# App-specific file storage
app.upload.dir=uploads
app.max-file-size=104857600

# -------------------------------------------------------
# Storage Strategy: "local" or "s3"
# Set STORAGE_STRATEGY=s3 in .env to use AWS S3
# -------------------------------------------------------
app.storage.strategy=${STORAGE_STRATEGY}

# AWS S3 Configuration (only used when app.storage.strategy=s3)
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
aws.s3.region=${AWS_S3_REGION}
aws.s3.access-key=${AWS_S3_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY}

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}

# Server Port
server.port=${SERVER_PORT}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
